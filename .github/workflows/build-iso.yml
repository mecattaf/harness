---
name: Build ISO
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  build_iso:
    name: Build installation ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Build ISO
        id: build-iso
        env:
          TARGET_IMAGE: ghcr.io/mecattaf/harness:latest
          TARGET_CONFIG: ./iso.toml
        run: |
          sudo podman pull "${TARGET_IMAGE}"
          sudo mkdir -p rpm-gpg output
          sudo podman run --rm -it -v ./rpm-gpg:/out:Z "${TARGET_IMAGE}" bash -c 'cp /etc/pki/rpm-gpg/* /out'
          sudo podman run \
            --rm -it \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v "${TARGET_CONFIG}:/config.toml:ro" \
            -v ./output/:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v ./rpm-gpg/:/etc/pki/rpm-gpg/:ro \
            quay.io/centos-bootc/bootc-image-builder:latest --type iso --rootfs btrfs --use-librepo=True \
            "${TARGET_IMAGE}"
          echo "output-directory=$(realpath ./output)" >> $GITHUB_OUTPUT

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: harness-iso-${{ github.run_number }}
          path: ${{ steps.build-iso.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true
